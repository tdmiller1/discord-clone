name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  server:
    name: Server (build + health + image)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Health smoke test
        run: |
          HTTP_PORT=8080 node dist/index.js &
          SRV=$!
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8080/health && break; sleep 0.5; done
          curl -sf http://127.0.0.1:8080/health
          kill "$SRV"
      - name: Build Docker image
        run: docker build -t discord-clone-server:ci .

  client:
    name: Client (tauri build)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf build-essential \
            file libssl-dev libxdo-dev libdbus-1-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri
      - run: npm ci
      - name: Generate icons
        run: npm run icons
      - name: Build Tauri app
        run: npm run tauri build
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.os }}
          path: |
            client/src-tauri/target/release/bundle/**/*.AppImage
            client/src-tauri/target/release/bundle/**/*.deb
            client/src-tauri/target/release/bundle/**/*.msi
            client/src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: warn
