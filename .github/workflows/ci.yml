name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  release-version-guard:
    name: Release version guard (tag matches committed version)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify tag matches committed version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMITTED=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$COMMITTED" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$VERSION) does not match committed version $COMMITTED"
            exit 1
          fi
          echo "tag $GITHUB_REF_NAME matches committed version $COMMITTED"


  server:
    name: Server (build + health + image)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Health smoke test
        run: |
          HTTP_PORT=8080 node dist/index.js &
          SRV=$!
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8080/health && break; sleep 0.5; done
          curl -sf http://127.0.0.1:8080/health
          kill "$SRV"
      - name: Build Docker image
        run: docker build -t discord-clone-server:ci .

  client:
    name: Client (tauri build)
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux ships AppImage only (deb dropped — the updater can't self-update a .deb).
          # The .sig files only exist on tag builds (createUpdaterArtifacts, see below); on
          # PR/branch builds they simply don't match (upload step is if-no-files-found: warn).
          - os: ubuntu-latest
            artifacts: |
              client/src-tauri/target/release/bundle/**/*.AppImage
              client/src-tauri/target/release/bundle/**/*.AppImage.sig
          # Windows ships NSIS (-setup.exe, the updater target) + MSI. Only the NSIS .sig is
          # required by the updater, so we don't depend on a .msi.sig existing.
          - os: windows-latest
            artifacts: |
              client/src-tauri/target/release/bundle/**/*.msi
              client/src-tauri/target/release/bundle/**/*.exe
              client/src-tauri/target/release/bundle/**/*.exe.sig
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf build-essential \
            file libssl-dev libxdo-dev libdbus-1-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri
      - run: npm ci
      - name: Generate icons
        run: npm run icons
      - name: Build Tauri app
        shell: bash
        env:
          # Used only when createUpdaterArtifacts is on (tag builds). Empty on PR/branch
          # builds and fork PRs (secrets unavailable), where signing is also skipped.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # On v* tags, layer in createUpdaterArtifacts to emit signed .sig files for the
          # updater. That requires the signing key, so non-tag builds skip it and stay green.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            npm run tauri build -- --config src-tauri/updater.conf.json
          else
            npm run tauri build
          fi
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: warn
      - name: Attach installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: ${{ matrix.artifacts }}

  release-updater-manifest:
    name: Assemble + attach updater manifest (latest.json)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # Runs after BOTH client matrix legs finish, so every platform's installer + .sig is
    # already on the release — a single assembler avoids parallel jobs racing on latest.json.
    needs: client
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Download release signatures
        run: gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --pattern '*.sig' --dir sigs
      - name: Build latest.json
        run: node scripts/build-updater-manifest.mjs
      - name: Attach latest.json to GitHub Release
        run: gh release upload "$GITHUB_REF_NAME" latest.json --repo "$GITHUB_REPOSITORY" --clobber

  release-server-image:
    name: Release server image (push to GHCR)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-version-guard
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/tdmiller1/discord-clone-server
    steps:
      - uses: actions/checkout@v4
      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build server image
        working-directory: server
        run: docker build -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
      - name: Push server image
        run: |
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
