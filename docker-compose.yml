services:
  server:
    # Pull the published server image from GHCR (the GH repository image) by
    # default. Override/pin via SERVER_IMAGE_TAG in the root .env. Building from
    # source is the dev-only path — see docs/DEVELOPMENT.md.
    image: ghcr.io/tdmiller1/discord-clone-server:${SERVER_IMAGE_TAG:-latest}
    ports:
      - "8080:8080"
      # UDP media range for the SFU (used from M4 onward). Canonical range is
      # 40000-40010; must equal RTC_MIN_PORT/RTC_MAX_PORT here, in
      # server/.env.example, and in deploy/ (CLAUDE.md gotcha — keep all in sync).
      - "40000-40010:40000-40010/udp"
    environment:
      NODE_ENV: production
      HTTP_PORT: "8080"
      DATA_DIR: /data
      # Public IP the SFU advertises to clients for WebRTC media (mediasoup
      # announcedIp). Must be a routable IPv4, set in the root .env. Falls back to
      # localhost for local-only dev. NOT reachable via the Cloudflare tunnel —
      # the UDP RTC range below must be port-forwarded directly on the router.
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      # Extra ICE candidate IPs (comma-separated), e.g. the host's LAN IP so clients
      # on the same network reach the SFU directly instead of hairpinning the public
      # IP. Set in the root .env. Each extra IP consumes an additional UDP port per
      # transport from the RTC range below.
      RTC_EXTRA_ANNOUNCED_IPS: ${RTC_EXTRA_ANNOUNCED_IPS:-}
      RTC_MIN_PORT: "40000"
      RTC_MAX_PORT: "40010"
      MAX_UPLOAD_MB: "10"
    volumes:
      - discord-data:/data
    restart: unless-stopped

  # Hosted web client (nginx serving the Vite build of the Svelte app). A third
  # deployable alongside the Tauri desktop app — same webview code, full voice via
  # mediasoup-client. The public API/app URLs (VITE_SERVER_URL/VITE_APP_URL) are baked
  # into the bundle at BUILD time by CI from the repo Actions Variables, so the
  # published image already targets the public deployment. Pull it from GHCR by default
  # (same as the server image); override/pin via WEB_IMAGE_TAG in the root .env.
  # Building from source is the dev-only path — see docs/DEVELOPMENT.md.
  # Reached by the tunnel via http://localhost:8083 (cloudflared is on host net).
  web:
    image: ghcr.io/tdmiller1/discord-clone-web:${WEB_IMAGE_TAG:-latest}
    ports:
      - "8083:80"
    restart: unless-stopped

  # Cloudflare Tunnel connector. Exposes the server publicly without opening any
  # inbound ports. Runs on host networking so the dashboard's origin service of
  # http://localhost:8080 resolves to the host's published server port. Token is
  # read from the root .env (gitignored).
  # NOTE: only HTTP/WS traverse the tunnel; WebRTC voice (UDP 40000-40010) does not.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    network_mode: host
    restart: unless-stopped
    depends_on:
      - server

volumes:
  discord-data:
